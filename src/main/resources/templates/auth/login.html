<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="'Login | ' + ${institute.name}">Login — CET Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-600 via-blue-700 to-indigo-800 flex items-center justify-center p-4">

<div class="w-full max-w-md">

    <!-- Institute Logo + Name -->
    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-20 h-20 bg-white rounded-2xl shadow-lg mb-4 overflow-hidden">
            <!-- Logo image if set in application.properties -->
            <img th:if="${institute.logoUrl != null and !institute.logoUrl.isEmpty()}"
                 th:src="${institute.logoUrl}"
                 th:alt="${institute.name}"
                 class="w-full h-full object-contain p-1"/>
            <!-- Fallback: text avatar -->
            <span th:unless="${institute.logoUrl != null and !institute.logoUrl.isEmpty()}"
                  class="text-blue-600 font-extrabold text-2xl"
                  th:text="${institute.logoText}">CP</span>
        </div>
        <h1 class="text-3xl font-bold text-white" th:text="${institute.name}">CET Portal</h1>
        <p class="text-blue-200 mt-1 text-sm" th:text="${institute.tagline}">Mock Test System for Coaching Institutes</p>
    </div>

    <!-- Login Card -->
    <div class="bg-white rounded-2xl shadow-2xl p-8">
        <h2 class="text-xl font-semibold text-gray-800 mb-6">Sign in to your account</h2>

        <!-- Error Alert -->
        <div th:if="${error}"
             class="mb-4 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm flex items-center gap-2">
            <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <span th:text="${error}">Invalid credentials</span>
        </div>

        <!-- Success / Logout Alert -->
        <div th:if="${message}"
             class="mb-4 bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg text-sm flex items-center gap-2">
            <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
            <span th:text="${message}">Logged out successfully</span>
        </div>

        <form action="/login" method="post" class="space-y-4">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" name="username" required autofocus
                       class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition text-sm"
                       placeholder="Enter your username"/>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" name="password" required
                       class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition text-sm"
                       placeholder="Enter your password"/>
            </div>

            <button type="submit"
                    class="w-full py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                Sign In
            </button>
        </form>

        <div class="mt-6 pt-5 border-t border-gray-100 text-center text-xs text-gray-400">
            <p>Contact your administrator for login credentials.</p>
        </div>
    </div>

    <!-- Footer -->
    <div class="text-center mt-6 space-y-1">
        <p class="text-blue-200 text-sm">
            &copy; 2025 <span th:text="${institute.copyright}">Aparaitech Software</span>
        </p>
        <p th:if="${institute.address != null and !institute.address.isEmpty()}"
           class="text-blue-300 text-xs" th:text="${institute.address}"></p>
        <p class="text-blue-300 text-xs">
            <span th:if="${institute.phone != null and !institute.phone.isEmpty()}"
                  th:text="${institute.phone}"></span>
            <span th:if="${institute.phone != null and !institute.phone.isEmpty() and institute.email != null and !institute.email.isEmpty()}"> &bull; </span>
            <span th:if="${institute.email != null and !institute.email.isEmpty()}"
                  th:text="${institute.email}"></span>
        </p>
    </div>

</div>

</body>
</html>
