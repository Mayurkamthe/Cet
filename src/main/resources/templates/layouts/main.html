<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(content, pageTitle)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle != null ? pageTitle + ' | ' + institute.name : institute.name}">CET Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: { DEFAULT: '#2563eb', dark: '#1d4ed8', light: '#eff6ff' } } } }
        }
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .sidebar-link { @apply flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium transition-colors; }
        .sidebar-link:hover { @apply bg-blue-50 text-blue-700; }
        .sidebar-link.active { @apply bg-blue-600 text-white; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans antialiased">

<!-- Flash Messages -->
<div th:if="${success}" x-data="{show:true}" x-show="show" x-cloak
     class="fixed top-4 right-4 z-50 bg-green-500 text-white px-4 py-3 rounded-lg shadow-lg flex items-center gap-3 max-w-xs sm:max-w-sm">
    <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
    </svg>
    <span th:text="${success}" class="text-sm"></span>
    <button @click="show=false" class="ml-auto text-white/80 hover:text-white flex-shrink-0">✕</button>
</div>
<div th:if="${error}" x-data="{show:true}" x-show="show" x-cloak
     class="fixed top-4 right-4 z-50 bg-red-500 text-white px-4 py-3 rounded-lg shadow-lg flex items-center gap-3 max-w-xs sm:max-w-sm">
    <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
    </svg>
    <span th:text="${error}" class="text-sm"></span>
    <button @click="show=false" class="ml-auto text-white/80 hover:text-white flex-shrink-0">✕</button>
</div>

<div class="flex h-screen overflow-hidden" x-data="{sidebarOpen: false}">

    <!-- Sidebar -->
    <aside class="fixed inset-y-0 left-0 z-40 w-64 bg-white shadow-xl transform transition-transform duration-300 ease-in-out flex flex-col"
           :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'">

        <!-- Institute Logo -->
        <div class="flex items-center gap-3 min-h-[4rem] py-2.5 px-4 bg-blue-600 flex-shrink-0">
            <div class="w-9 h-9 bg-white rounded-lg flex items-center justify-center flex-shrink-0 overflow-hidden">
                <img th:if="${institute.logoUrl != null and !institute.logoUrl.isEmpty()}"
                     th:src="${institute.logoUrl}" th:alt="${institute.name}"
                     class="w-full h-full object-contain p-0.5"/>
                <span th:unless="${institute.logoUrl != null and !institute.logoUrl.isEmpty()}"
                      class="text-blue-600 font-extrabold text-sm" th:text="${institute.logoText}">CP</span>
            </div>
            <div class="min-w-0 flex-1">
                <!-- FIX: 2-line clamp instead of harsh mid-word truncation -->
                <div class="text-white font-bold text-sm leading-tight line-clamp-2"
                     th:text="${institute.name}" th:title="${institute.name}">CET Portal</div>
                <div class="text-blue-200 text-xs leading-snug line-clamp-1 mt-0.5"
                     th:text="${institute.tagline}" th:title="${institute.tagline}">Mock Test System</div>
            </div>
        </div>

        <!-- Nav: FIX: pb-6 so logout never gets cut off on short screens -->
        <nav class="flex-1 overflow-y-auto p-4 space-y-1 pb-6">

            <!-- Admin Nav -->
            <div sec:authorize="hasRole('ADMIN')">
                <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider px-4 mb-2 mt-3">Admin</p>
                <!-- FIX: @click="sidebarOpen=false" on every link to auto-close on mobile -->
                <a href="/admin/dashboard" class="sidebar-link text-gray-700"
                   th:classappend="${currentUri.contains('/dashboard')} ? 'active' : ''"
                   @click="sidebarOpen=false">
                    <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                    </svg>
                    Dashboard
                </a>
                <a href="/admin/students" class="sidebar-link text-gray-700"
                   th:classappend="${currentUri.contains('/students')} ? 'active' : ''"
                   @click="sidebarOpen=false">
                    <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
                    </svg>
                    Students
                </a>
                <a href="/admin/exams" class="sidebar-link text-gray-700"
                   th:classappend="${currentUri.contains('/exams')} ? 'active' : ''"
                   @click="sidebarOpen=false">
                    <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                    </svg>
                    Exams
                </a>
                <a href="/admin/results" class="sidebar-link text-gray-700"
                   th:classappend="${currentUri.contains('/results')} ? 'active' : ''"
                   @click="sidebarOpen=false">
                    <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                    </svg>
                    Results
                </a>
            </div>

            <!-- Student Nav -->
            <div sec:authorize="hasRole('STUDENT')">
                <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider px-4 mb-2 mt-3">Student</p>
                <a href="/student/dashboard" class="sidebar-link text-gray-700"
                   th:classappend="${currentUri.contains('/dashboard')} ? 'active' : ''"
                   @click="sidebarOpen=false">
                    <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                    </svg>
                    Dashboard
                </a>
                <a href="/student/exams" class="sidebar-link text-gray-700"
                   th:classappend="${currentUri.contains('/exams')} ? 'active' : ''"
                   @click="sidebarOpen=false">
                    <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                    </svg>
                    Available Exams
                </a>
                <a href="/student/results" class="sidebar-link text-gray-700"
                   th:classappend="${currentUri.contains('/results')} ? 'active' : ''"
                   @click="sidebarOpen=false">
                    <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                    </svg>
                    My Results
                </a>
                <a href="/student/profile" class="sidebar-link text-gray-700" @click="sidebarOpen=false">
                    <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                    Profile
                </a>
            </div>

            <!-- Logout -->
            <div class="pt-4 mt-4 border-t border-gray-100">
                <form action="/logout" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="sidebar-link text-gray-700 w-full hover:bg-red-50 hover:text-red-600">
                        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                        </svg>
                        Logout
                    </button>
                </form>
            </div>
        </nav>
    </aside>

    <!-- Mobile overlay -->
    <div x-show="sidebarOpen" @click="sidebarOpen=false" x-cloak
         class="fixed inset-0 bg-black/40 z-30 md:hidden"></div>

    <!-- Main content -->
    <div class="flex-1 flex flex-col md:ml-64 min-h-screen">

        <!-- Top Header -->
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-4 sm:px-6 sticky top-0 z-20">
            <div class="flex items-center gap-2 sm:gap-3 min-w-0">
                <button @click="sidebarOpen=!sidebarOpen"
                        class="md:hidden p-2 rounded-lg hover:bg-gray-100 text-gray-600 flex-shrink-0">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
                <h1 th:text="${pageTitle ?: 'Dashboard'}"
                    class="text-base sm:text-lg font-semibold text-gray-800 truncate"></h1>
            </div>
            <div class="flex items-center gap-2 sm:gap-3 flex-shrink-0">
                <!-- FIX: hide welcome text on xs, truncate username on small screens -->
                <div class="hidden sm:flex items-center text-sm text-gray-500 gap-1">
                    Welcome,
                    <!-- FIX: max-w + truncate so long usernames don't break header -->
                    <span sec:authentication="name"
                          class="font-medium text-gray-800 max-w-[120px] truncate inline-block"></span>
                </div>
                <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white text-sm font-bold flex-shrink-0">
                    <span sec:authentication="name"
                          th:text="${#strings.substring(#authentication.name, 0, 1).toUpperCase()}">A</span>
                </div>
            </div>
        </header>

        <!-- Page Content -->
        <main class="flex-1 overflow-y-auto p-4 sm:p-6">
            <th:block th:replace="${content}"/>
        </main>

        <!-- Footer -->
        <footer class="bg-white border-t border-gray-200 py-3 px-6 text-center text-sm text-gray-400">
            &copy; 2025 <span th:text="${institute.copyright}">Aparaitech Software</span>
            <span th:if="${institute.address != null and !institute.address.isEmpty()}">
                &mdash; <span th:text="${institute.address}"></span>
            </span>
        </footer>
    </div>
</div>

</body>
</html>
