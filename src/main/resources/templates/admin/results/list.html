<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/main :: layout(~{::content}, 'All Results')}">
<th:block th:fragment="content">

<div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
    <!-- Header -->
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 p-5 border-b border-gray-100">
        <div>
            <h2 class="text-base font-semibold text-gray-800">All Results</h2>
            <p class="text-sm text-gray-500">Submitted exam attempts across all students</p>
        </div>
        <form action="/admin/results" method="get" class="flex gap-2">
            <input type="text" name="search" th:value="${search}"
                   placeholder="Search student or exam..."
                   class="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 w-52"/>
            <button type="submit"
                    class="px-3 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg text-sm text-gray-700">Search</button>
        </form>
    </div>

    <div class="overflow-x-auto">
        <table class="w-full text-sm">
            <thead class="bg-gray-50">
                <tr>
                    <th class="text-left px-5 py-3 text-gray-500 font-medium">#</th>
                    <th class="text-left px-5 py-3 text-gray-500 font-medium">Student</th>
                    <th class="text-left px-5 py-3 text-gray-500 font-medium">Exam</th>
                    <th class="text-left px-5 py-3 text-gray-500 font-medium">Score</th>
                    <th class="text-left px-5 py-3 text-gray-500 font-medium hidden md:table-cell">Correct</th>
                    <th class="text-left px-5 py-3 text-gray-500 font-medium hidden md:table-cell">Wrong</th>
                    <th class="text-left px-5 py-3 text-gray-500 font-medium">%</th>
                    <th class="text-left px-5 py-3 text-gray-500 font-medium">Action</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-50">
                <tr th:if="${attempts.empty}">
                    <td colspan="8" class="px-5 py-16">
                        <div class="flex flex-col items-center justify-center text-center gap-3">
                            <div class="w-14 h-14 bg-gray-100 rounded-full flex items-center justify-center">
                                <svg class="w-7 h-7 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                          d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                                </svg>
                            </div>
                            <div>
                                <p class="text-gray-600 font-medium">No results yet</p>
                                <p class="text-gray-400 text-sm mt-0.5">Results will appear here once students submit exams</p>
                            </div>
                        </div>
                    </td>
                </tr>
                <tr th:each="a, idx : ${attempts}" class="hover:bg-gray-50">
                    <td class="px-5 py-3 text-gray-400" th:text="${idx.count}">1</td>
                    <td class="px-5 py-3 min-w-[140px]">
                        <div class="flex items-center gap-3">
                            <div class="w-7 h-7 rounded-full bg-blue-100 flex items-center justify-center text-blue-700 text-xs font-bold"
                                 th:text="${#strings.substring(a.student.fullName, 0, 1).toUpperCase()}">S</div>
                            <div>
                                <div class="font-medium text-gray-800" th:text="${a.student.fullName}">Name</div>
                                <div class="text-xs text-gray-400" th:text="${a.student.username}">user</div>
                            </div>
                        </div>
                    </td>
                    <td class="px-5 py-3 text-gray-700" th:text="${a.exam.title}">Exam</td>
                    <td class="px-5 py-3 font-bold text-gray-800"
                        th:text="${a.result != null ? a.result.rawScore : '-'}">-</td>
                    <td class="px-5 py-3 text-green-600 hidden md:table-cell"
                        th:text="${a.result != null ? a.result.correct : '-'}">-</td>
                    <td class="px-5 py-3 text-red-600 hidden md:table-cell"
                        th:text="${a.result != null ? a.result.wrong : '-'}">-</td>
                    <td class="px-5 py-3">
                        <span th:if="${a.result != null}"
                              th:text="${#numbers.formatDecimal(a.result.percentage, 1, 1) + '%'}"
                              class="font-medium text-gray-700">0%</span>
                        <span th:unless="${a.result != null}" class="text-gray-400">-</span>
                    </td>
                    <td class="px-5 py-3">
                        <a th:href="@{/admin/results/{id}(id=${a.id})}"
                           class="text-blue-600 hover:text-blue-800 text-xs font-medium">View Detail</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

</th:block>
</html>
