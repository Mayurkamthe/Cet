<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/main :: layout(~{::content}, ${student != null ? 'Edit Student' : 'Add Student'})}">
<th:block th:fragment="content">

<div class="max-w-lg mx-auto">
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
        <h2 class="text-base font-semibold text-gray-800 mb-6"
            th:text="${student != null ? 'Edit Student' : 'Add New Student'}">Add Student</h2>

        <form th:action="${student != null ? '/admin/students/' + student.id + '/edit' : '/admin/students/new'}"
              method="post" class="space-y-4">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div th:unless="${student != null}">
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Username <span class="text-red-500">*</span>
                </label>
                <input type="text" name="username" required
                       class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="e.g. student001"/>
                <p class="text-xs text-gray-400 mt-1">Used for login. Cannot be changed later.</p>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Full Name <span class="text-red-500">*</span>
                </label>
                <input type="text" name="fullName" required
                       th:value="${student?.fullName}"
                       class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="Student's full name"/>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Email <span class="text-red-500">*</span>
                </label>
                <input type="email" name="email" required
                       th:value="${student?.email}"
                       class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="student@example.com"/>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Phone</label>
                <input type="tel" name="phone"
                       th:value="${student?.phone}"
                       class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="10-digit mobile number"/>
            </div>

            <div th:unless="${student != null}">
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Password <span class="text-red-500">*</span>
                </label>
                <input type="password" name="password" required minlength="6"
                       class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="Minimum 6 characters"/>
            </div>

            <div th:if="${student != null}" class="flex items-center gap-3">
                <input type="checkbox" name="enabled" id="enabled"
                       th:checked="${student.enabled}"
                       class="w-4 h-4 text-blue-600 rounded border-gray-300"/>
                <label for="enabled" class="text-sm font-medium text-gray-700">Account Active</label>
            </div>

            <div class="flex gap-3 pt-2">
                <button type="submit"
                        class="flex-1 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg text-sm transition-colors">
                    <span th:text="${student != null ? 'Update Student' : 'Create Student'}">Save</span>
                </button>
                <a href="/admin/students"
                   class="flex-1 py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium rounded-lg text-sm text-center transition-colors">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>

</th:block>
</html>
