<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/main :: layout(~{::content}, 'Students')}">
<th:block th:fragment="content">

<div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
    <!-- Header -->
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 p-5 border-b border-gray-100">
        <div>
            <h2 class="text-base font-semibold text-gray-800">All Students</h2>
            <p class="text-sm text-gray-500">Manage student accounts</p>
        </div>
        <div class="flex items-center gap-3">
            <form action="/admin/students" method="get" class="flex gap-2">
                <input type="text" name="search" th:value="${search}"
                       placeholder="Search students..."
                       class="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 w-48"/>
                <button type="submit"
                        class="px-3 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg text-sm text-gray-700">
                    Search
                </button>
            </form>
            <a href="/admin/students/import"
               class="flex items-center gap-1.5 px-3 py-2 bg-green-600 hover:bg-green-700 text-white text-sm font-medium rounded-lg transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
                Import Excel
            </a>
            <a href="/admin/students/export"
               class="flex items-center gap-1.5 px-3 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm font-medium rounded-lg transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                </svg>
                Export
            </a>
            <a href="/admin/students/new"
               class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg transition-colors">
                + Add Student
            </a>
        </div>
    </div>

    <!-- Table -->
    <div class="overflow-x-auto">
        <table class="w-full text-sm">
            <thead class="bg-gray-50">
                <tr>
                    <th class="text-left px-5 py-3 text-gray-500 font-medium">#</th>
                    <th class="text-left px-5 py-3 text-gray-500 font-medium">Name</th>
                    <th class="text-left px-5 py-3 text-gray-500 font-medium">Username</th>
                    <th class="text-left px-5 py-3 text-gray-500 font-medium">Email</th>
                    <th class="text-left px-5 py-3 text-gray-500 font-medium">Phone</th>
                    <th class="text-left px-5 py-3 text-gray-500 font-medium">Status</th>
                    <th class="text-left px-5 py-3 text-gray-500 font-medium">Actions</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-50">
                <tr th:if="${students.empty}">
                    <td colspan="7" class="px-5 py-12 text-center text-gray-400">
                        No students found. <a href="/admin/students/new" class="text-blue-600 hover:underline">Add one</a>
                    </td>
                </tr>
                <tr th:each="s, idx : ${students}" class="hover:bg-gray-50 transition-colors">
                    <td class="px-5 py-3 text-gray-400"
                        th:text="${students.number * students.size + idx.count}">1</td>
                    <td class="px-5 py-3">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-700 font-bold text-xs"
                                 th:text="${#strings.substring(s.fullName, 0, 1).toUpperCase()}">S</div>
                            <span class="font-medium text-gray-800" th:text="${s.fullName}">Name</span>
                        </div>
                    </td>
                    <td class="px-5 py-3 font-mono text-gray-600" th:text="${s.username}">username</td>
                    <td class="px-5 py-3 text-gray-600" th:text="${s.email ?: '-'}">email</td>
                    <td class="px-5 py-3 text-gray-600" th:text="${s.phone ?: '-'}">phone</td>
                    <td class="px-5 py-3">
                        <span th:if="${s.enabled}"
                              class="bg-green-100 text-green-700 text-xs px-2 py-0.5 rounded-full font-medium">Active</span>
                        <span th:unless="${s.enabled}"
                              class="bg-red-100 text-red-700 text-xs px-2 py-0.5 rounded-full font-medium">Disabled</span>
                    </td>
                    <td class="px-5 py-3">
                        <div class="flex items-center gap-2" x-data="{showReset:false}">
                            <a th:href="@{/admin/students/{id}/edit(id=${s.id})}"
                               class="text-blue-600 hover:text-blue-800 text-xs font-medium">Edit</a>

                            <button @click="showReset=!showReset"
                                    class="text-yellow-600 hover:text-yellow-800 text-xs font-medium">Reset Pwd</button>

                            <form th:action="@{/admin/students/{id}/delete(id=${s.id})}" method="post"
                                  onsubmit="return confirm('Delete this student?')">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="text-red-600 hover:text-red-800 text-xs font-medium">Delete</button>
                            </form>

                            <!-- Reset password inline form -->
                            <div x-show="showReset" x-cloak class="absolute mt-16 bg-white border border-gray-200 rounded-lg shadow-lg p-3 z-10 w-48">
                                <form th:action="@{/admin/students/{id}/reset-password(id=${s.id})}" method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <input type="password" name="newPassword" placeholder="New password" required minlength="6"
                                           class="w-full px-2 py-1.5 border rounded text-xs mb-2 focus:outline-none focus:ring-1 focus:ring-blue-500"/>
                                    <button type="submit"
                                            class="w-full bg-yellow-500 text-white text-xs py-1.5 rounded font-medium hover:bg-yellow-600">
                                        Set Password
                                    </button>
                                </form>
                            </div>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Pagination -->
    <div th:if="${students.totalPages > 1}"
         class="flex items-center justify-between px-5 py-3 border-t border-gray-100">
        <p class="text-sm text-gray-500">
            Page <span th:text="${students.number + 1}">1</span> of
            <span th:text="${students.totalPages}">1</span>
            (<span th:text="${students.totalElements}">0</span> total)
        </p>
        <div class="flex gap-2">
            <a th:unless="${students.first}"
               th:href="@{/admin/students(page=${students.number - 1}, search=${search})}"
               class="px-3 py-1.5 text-sm border border-gray-300 rounded-lg hover:bg-gray-50">Previous</a>
            <a th:unless="${students.last}"
               th:href="@{/admin/students(page=${students.number + 1}, search=${search})}"
               class="px-3 py-1.5 text-sm border border-gray-300 rounded-lg hover:bg-gray-50">Next</a>
        </div>
    </div>
</div>

</th:block>
</html>
