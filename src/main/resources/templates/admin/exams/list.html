<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/main :: layout(~{::content}, 'Exams')}">
<th:block th:fragment="content">

<div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
    <!-- Header -->
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 p-5 border-b border-gray-100">
        <div>
            <h2 class="text-base font-semibold text-gray-800">All Exams</h2>
            <p class="text-sm text-gray-500">Manage mock tests and exams</p>
        </div>
        <div class="flex items-center gap-3">
            <form action="/admin/exams" method="get" class="flex gap-2">
                <input type="text" name="search" th:value="${search}"
                       placeholder="Search exams..."
                       class="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 w-32 sm:w-44"/>
                <button type="submit"
                        class="px-3 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg text-sm text-gray-700">Search</button>
            </form>
            <a href="/admin/exams/new"
               class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg transition-colors">+ Create Exam</a>
        </div>
    </div>

    <!-- Table -->
    <div class="overflow-x-auto">
        <table class="w-full text-sm">
            <thead class="bg-gray-50">
                <tr>
                    <th class="text-left px-5 py-3 text-gray-500 font-medium">#</th>
                    <th class="text-left px-5 py-3 text-gray-500 font-medium">Title</th>
                    <th class="text-left px-5 py-3 text-gray-500 font-medium">Type</th>
                    <th class="text-left px-5 py-3 text-gray-500 font-medium hidden md:table-cell">Duration</th>
                    <th class="text-left px-5 py-3 text-gray-500 font-medium hidden lg:table-cell">Questions</th>
                    <th class="text-left px-5 py-3 text-gray-500 font-medium">Status</th>
                    <th class="text-left px-5 py-3 text-gray-500 font-medium">Actions</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-50">
                <tr th:if="${exams.empty}">
                    <td colspan="7" class="px-5 py-16">
                        <div class="flex flex-col items-center justify-center text-center gap-3">
                            <div class="w-14 h-14 bg-gray-100 rounded-full flex items-center justify-center">
                                <svg class="w-7 h-7 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                          d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                                </svg>
                            </div>
                            <div>
                                <p class="text-gray-600 font-medium">No exams yet</p>
                                <p class="text-gray-400 text-sm mt-0.5">Create your first mock test to get started</p>
                            </div>
                            <a href="/admin/exams/new"
                               class="mt-1 inline-flex items-center gap-1.5 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg transition-colors">
                                + Create Exam
                            </a>
                        </div>
                    </td>
                </tr>
                <tr th:each="e, idx : ${exams}" class="hover:bg-gray-50 transition-colors">
                    <td class="px-5 py-3 text-gray-400" th:text="${exams.number * exams.size + idx.count}">1</td>
                    <td class="px-5 py-3">
                        <div class="font-medium text-gray-800" th:text="${e.title}">Title</div>
                        <div class="text-xs text-gray-400" th:text="${e.description}"></div>
                    </td>
                    <td class="px-5 py-3 text-gray-600" th:text="${e.examType}">Type</td>
                    <td class="px-5 py-3 text-gray-600 hidden md:table-cell" th:text="${e.durationMinutes + ' min'}">60 min</td>
                    <td class="px-5 py-3 text-gray-600 hidden lg:table-cell" th:text="${e.totalQuestions}">100</td>
                    <td class="px-5 py-3">
                        <span th:switch="${e.status?.name()}">
                            <span th:case="'PUBLISHED'" class="bg-green-100 text-green-700 text-xs px-2 py-0.5 rounded-full font-medium">Published</span>
                            <span th:case="'DRAFT'" class="bg-yellow-100 text-yellow-700 text-xs px-2 py-0.5 rounded-full font-medium">Draft</span>
                            <span th:case="'CLOSED'" class="bg-gray-100 text-gray-600 text-xs px-2 py-0.5 rounded-full font-medium">Closed</span>
                            <span th:case="*" class="bg-gray-100 text-gray-600 text-xs px-2 py-0.5 rounded-full font-medium" th:text="${e.status}">-</span>
                        </span>
                    </td>
                    <td class="px-5 py-3">
                        <div class="flex flex-wrap items-center gap-1.5 min-w-0">
                            <a th:href="@{/admin/exams/{id}/edit(id=${e.id})}"
                               class="text-blue-600 hover:text-blue-800 text-xs font-medium">Edit</a>

                            <a th:href="@{/admin/exams/{id}/paper(id=${e.id})}"
                               class="text-indigo-600 hover:text-indigo-800 text-xs font-medium">PDF</a>

                            <a th:href="@{/admin/exams/{id}/answers(id=${e.id})}"
                               class="text-purple-600 hover:text-purple-800 text-xs font-medium">Answers</a>

                            <a th:href="@{/admin/exams/{id}/results(id=${e.id})}"
                               class="text-teal-600 hover:text-teal-800 text-xs font-medium">Results</a>

                            <form th:if="${e.status?.name() == 'DRAFT'}"
                                  th:action="@{/admin/exams/{id}/publish(id=${e.id})}" method="post" class="inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="text-green-600 hover:text-green-800 text-xs font-medium">Publish</button>
                            </form>

                            <form th:if="${e.status?.name() == 'PUBLISHED'}"
                                  th:action="@{/admin/exams/{id}/close(id=${e.id})}" method="post" class="inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="text-orange-600 hover:text-orange-800 text-xs font-medium">Close</button>
                            </form>

                            <form th:action="@{/admin/exams/{id}/delete(id=${e.id})}" method="post"
                                  onsubmit="return confirm('Delete this exam?')" class="inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="text-red-600 hover:text-red-800 text-xs font-medium">Delete</button>
                            </form>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Pagination -->
    <div th:if="${exams.totalPages > 1}"
         class="flex items-center justify-between px-5 py-3 border-t border-gray-100">
        <p class="text-sm text-gray-500">
            Page <span th:text="${exams.number + 1}">1</span> of
            <span th:text="${exams.totalPages}">1</span>
        </p>
        <div class="flex gap-2">
            <a th:unless="${exams.first}"
               th:href="@{/admin/exams(page=${exams.number - 1}, search=${search})}"
               class="px-3 py-1.5 text-sm border border-gray-300 rounded-lg hover:bg-gray-50">Previous</a>
            <a th:unless="${exams.last}"
               th:href="@{/admin/exams(page=${exams.number + 1}, search=${search})}"
               class="px-3 py-1.5 text-sm border border-gray-300 rounded-lg hover:bg-gray-50">Next</a>
        </div>
    </div>
</div>

</th:block>
</html>
