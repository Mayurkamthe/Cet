<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/main :: layout(~{::content}, ${exam != null ? 'Edit Exam' : 'Create Exam'})}">
<th:block th:fragment="content">

<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
        <h2 class="text-base font-semibold text-gray-800 mb-6"
            th:text="${exam != null ? 'Edit Exam' : 'Create New Exam'}">Create Exam</h2>

        <form th:action="${exam != null ? '/admin/exams/' + exam.id + '/edit' : '/admin/exams/new'}"
              method="post" class="space-y-5">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Exam Title <span class="text-red-500">*</span>
                </label>
                <input type="text" name="title" required
                       th:value="${exam?.title}"
                       class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="e.g. CET Mock Test – Set 1"/>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                <textarea name="description" rows="2"
                          class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                          placeholder="Optional description"
                          th:text="${exam?.description}"></textarea>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Exam Type <span class="text-red-500">*</span>
                    </label>
                    <select name="examType" required
                            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">Select type</option>
                        <option value="FULL_LENGTH" th:selected="${exam?.examType == 'FULL_LENGTH'}">Full Length</option>
                        <option value="CHAPTER_WISE" th:selected="${exam?.examType == 'CHAPTER_WISE'}">Chapter Wise</option>
                        <option value="TOPIC_WISE" th:selected="${exam?.examType == 'TOPIC_WISE'}">Topic Wise</option>
                        <option value="SECTIONAL" th:selected="${exam?.examType == 'SECTIONAL'}">Sectional</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Duration (minutes) <span class="text-red-500">*</span>
                    </label>
                    <input type="number" name="durationMinutes" required min="1"
                           th:value="${exam?.durationMinutes ?: 180}"
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Total Questions <span class="text-red-500">*</span>
                    </label>
                    <input type="number" name="totalQuestions" required min="1"
                           th:value="${exam?.totalQuestions ?: 150}"
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Marks / Correct</label>
                    <input type="number" name="marksPerCorrect" min="1"
                           th:value="${exam?.marksPerCorrect ?: 4}"
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Negative Marks</label>
                    <input type="number" name="negativeMarks" min="0"
                           th:value="${exam?.negativeMarks ?: 1}"
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Schedule Date &amp; Time</label>
                <input type="datetime-local" name="scheduledAt"
                       th:value="${exam?.scheduledAt != null ? #temporals.format(exam.scheduledAt, 'yyyy-MM-dd'T'HH:mm') : ''}"
                       class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                <p class="text-xs text-gray-400 mt-1">Optional. Leave blank for unscheduled.</p>
            </div>

            <div class="flex gap-3 pt-2">
                <button type="submit"
                        class="flex-1 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg text-sm transition-colors">
                    <span th:text="${exam != null ? 'Update Exam' : 'Create Exam'}">Save</span>
                </button>
                <a href="/admin/exams"
                   class="flex-1 py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium rounded-lg text-sm text-center transition-colors">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>

</th:block>
</html>
