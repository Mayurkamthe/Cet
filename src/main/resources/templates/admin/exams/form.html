<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/main :: layout(~{::content}, ${exam != null ? 'Edit Exam' : 'Create Exam'})}">
<th:block th:fragment="content">

<div class="max-w-2xl mx-auto">

    <!-- Step indicator (item #7 workflow) -->
    <div th:unless="${exam != null}" class="flex items-center justify-center gap-2 mb-6 text-xs font-medium">
        <span class="flex items-center gap-1.5 text-blue-600">
            <span class="w-6 h-6 rounded-full bg-blue-600 text-white flex items-center justify-center">1</span>
            Create Exam
        </span>
        <span class="w-8 h-px bg-gray-300"></span>
        <span class="flex items-center gap-1.5 text-gray-400">
            <span class="w-6 h-6 rounded-full bg-gray-200 text-gray-500 flex items-center justify-center">2</span>
            Upload Paper
        </span>
        <span class="w-8 h-px bg-gray-300"></span>
        <span class="flex items-center gap-1.5 text-gray-400">
            <span class="w-6 h-6 rounded-full bg-gray-200 text-gray-500 flex items-center justify-center">3</span>
            Answer Key
        </span>
        <span class="w-8 h-px bg-gray-300"></span>
        <span class="flex items-center gap-1.5 text-gray-400">
            <span class="w-6 h-6 rounded-full bg-gray-200 text-gray-500 flex items-center justify-center">4</span>
            Preview
        </span>
        <span class="w-8 h-px bg-gray-300"></span>
        <span class="flex items-center gap-1.5 text-gray-400">
            <span class="w-6 h-6 rounded-full bg-gray-200 text-gray-500 flex items-center justify-center">5</span>
            Publish
        </span>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
        <h2 class="text-base font-semibold text-gray-800 mb-6"
            th:text="${exam != null ? 'Edit Exam' : 'Create New Exam'}">Create Exam</h2>

        <form th:action="${exam != null ? '/admin/exams/' + exam.id + '/edit' : '/admin/exams/new'}"
              method="post" class="space-y-5"
              x-data="{
                  startAt: '',
                  endAt: '',
                  get invalidRange() {
                      return this.startAt && this.endAt && new Date(this.endAt) <= new Date(this.startAt);
                  }
              }"
              @submit="if (invalidRange) { $event.preventDefault(); alert('End date/time must be after the start date/time.'); }">

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Exam Title <span class="text-red-500">*</span>
                </label>
                <input type="text" name="title" required
                       th:value="${exam?.title ?: formTitle}"
                       class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="e.g. CET Mock Test – Set 1"/>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                <textarea name="description" rows="2"
                          class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                          placeholder="Optional description"
                          th:text="${exam?.description ?: formDescription}"></textarea>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Exam Type <span class="text-red-500">*</span>
                    </label>
                    <select name="examType" required
                            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">Select type</option>
                        <option value="CET" th:selected="${(exam?.examType ?: formExamType) == 'CET'}">CET</option>
                        <option value="NEET" th:selected="${(exam?.examType ?: formExamType) == 'NEET'}">NEET</option>
                        <option value="JEE" th:selected="${(exam?.examType ?: formExamType) == 'JEE'}">JEE</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Duration (minutes) <span class="text-red-500">*</span>
                    </label>
                    <input type="number" name="durationMinutes" required min="1"
                           th:value="${exam?.durationMinutes ?: formDuration ?: 180}"
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Total Questions <span class="text-red-500">*</span>
                    </label>
                    <input type="number" name="totalQuestions" required min="1"
                           th:value="${exam?.totalQuestions ?: formTotalQuestions ?: 150}"
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Marks / Correct</label>
                    <input type="number" name="marksPerCorrect" min="1"
                           th:value="${exam?.marksPerCorrect ?: formMarksPerCorrect ?: 4}"
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Negative Marks</label>
                    <input type="number" name="negativeMarks" min="0"
                           th:value="${exam?.negativeMarks ?: formNegativeMarks ?: 1}"
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                </div>
            </div>

            <!-- Item #3: Start / End date-time with validation -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Start Date &amp; Time</label>
                    <input type="datetime-local" name="startAt"
                           x-model="startAt"
                           th:value="${exam != null and exam.startAt != null} ? ${#temporals.format(exam.startAt, 'yyyy-MM-dd''T''HH:mm')} : ''"
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">End Date &amp; Time</label>
                    <input type="datetime-local" name="endAt"
                           x-model="endAt"
                           th:value="${exam != null and exam.endAt != null} ? ${#temporals.format(exam.endAt, 'yyyy-MM-dd''T''HH:mm')} : ''"
                           class="w-full px-4 py-2.5 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                           :class="invalidRange ? 'border-red-400 focus:ring-red-400' : 'border-gray-300 focus:ring-blue-500'"/>
                </div>
                <p x-show="invalidRange" x-cloak class="sm:col-span-2 text-xs text-red-600 flex items-center gap-1">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    End date/time must be after the start date/time.
                </p>
                <p class="sm:col-span-2 text-xs text-gray-400">
                    Both fields are optional. Students can only attempt the exam within this window once it's published.
                </p>
            </div>

            <div class="flex gap-3 pt-2">
                <button type="submit"
                        :disabled="invalidRange"
                        :class="invalidRange ? 'bg-gray-300 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700'"
                        class="flex-1 py-2.5 text-white font-semibold rounded-lg text-sm transition-colors">
                    <span th:text="${exam != null ? 'Update Exam' : 'Create Exam &amp; Continue →'}">Save</span>
                </button>
                <a href="/admin/exams"
                   class="flex-1 py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium rounded-lg text-sm text-center transition-colors">
                    Cancel
                </a>
            </div>
        </form>
    </div>

    <!-- Quick links once exam exists (edit mode) -->
    <div th:if="${exam != null}" class="mt-4 flex flex-wrap gap-2">
        <a th:href="@{/admin/exams/{id}/paper(id=${exam.id})}"
           class="px-3 py-1.5 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 text-xs font-medium rounded-lg transition-colors">
            📄 Question Paper
        </a>
        <a th:href="@{/admin/exams/{id}/answers(id=${exam.id})}"
           class="px-3 py-1.5 bg-purple-50 hover:bg-purple-100 text-purple-700 text-xs font-medium rounded-lg transition-colors">
            🔑 Answer Key
        </a>
        <a th:href="@{/admin/exams/{id}/preview(id=${exam.id})}"
           class="px-3 py-1.5 bg-teal-50 hover:bg-teal-100 text-teal-700 text-xs font-medium rounded-lg transition-colors">
            👁 Preview
        </a>
    </div>
</div>

</th:block>
</html>
