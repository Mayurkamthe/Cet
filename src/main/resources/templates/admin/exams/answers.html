<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/main :: layout(~{::content}, 'Answer Key')}">
<th:block th:fragment="content">

<div class="max-w-3xl mx-auto space-y-6">

    <!-- Header -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 flex items-center justify-between">
        <div>
            <h2 class="text-base font-semibold text-gray-800" th:text="${exam.title}">Exam</h2>
            <p class="text-sm text-gray-500">Enter the correct option (A/B/C/D) for each question</p>
        </div>
        <span th:if="${answerKey}"
              class="text-xs bg-green-100 text-green-700 px-3 py-1 rounded-full font-medium">Key Saved</span>
    </div>

    <!-- Answer Form -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
        <form th:action="@{/admin/exams/{id}/answers(id=${exam.id})}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Answer String <span class="text-red-500">*</span>
                </label>
                <p class="text-xs text-gray-400 mb-2">
                    Enter answers as a comma-separated string of length <strong th:text="${exam.totalQuestions}">0</strong>.
                    e.g. <code class="bg-gray-100 px-1 rounded">A,B,C,D,A,B,...</code>
                </p>
                <textarea name="answers" required rows="6"
                          class="w-full px-4 py-3 border border-gray-300 rounded-lg text-sm font-mono focus:outline-none focus:ring-2 focus:ring-blue-500"
                          placeholder="A,B,C,D,A,..."
                          th:text="${answerKey != null ? answerKey.answers : ''}"></textarea>
            </div>

            <!-- Visual grid hint -->
            <div th:if="${answers}" class="mb-4 grid grid-cols-10 gap-1 max-h-40 overflow-y-auto">
                <div th:each="ans, i : ${answers}"
                     class="aspect-square rounded text-xs flex items-center justify-center font-bold"
                     th:classappend="${ans != null && !ans.isBlank()} ? 'bg-blue-100 text-blue-700' : 'bg-gray-100 text-gray-300'">
                    <span th:text="${ans != null && !ans.isBlank() ? ans : (i.index + 1)}"></span>
                </div>
            </div>

            <div class="flex gap-3">
                <button type="submit"
                        class="flex-1 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg text-sm transition-colors">
                    Save Answer Key
                </button>
                <a href="/admin/exams"
                   class="px-5 py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium rounded-lg text-sm text-center">Back</a>
            </div>
        </form>
    </div>
</div>

</th:block>
</html>
