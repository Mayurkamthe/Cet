<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/main :: layout(~{::content}, 'My Profile')}">
<th:block th:fragment="content">

<div class="max-w-lg mx-auto">
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <!-- Profile Header -->
        <div class="bg-gradient-to-r from-blue-600 to-indigo-600 p-6 text-center">
            <div class="w-20 h-20 bg-white rounded-full flex items-center justify-center mx-auto mb-3 text-blue-600 text-3xl font-bold shadow"
                 th:text="${#strings.substring(student.fullName, 0, 1).toUpperCase()}">S</div>
            <h2 class="text-white font-bold text-lg" th:text="${student.fullName}">Name</h2>
            <p class="text-blue-200 text-sm" th:text="'@' + ${student.username}">@username</p>
        </div>

        <!-- Profile Details -->
        <div class="p-6 space-y-4">
            <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-lg">
                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                </svg>
                <div>
                    <div class="text-xs text-gray-400">Full Name</div>
                    <div class="text-sm font-medium text-gray-800" th:text="${student.fullName}">Name</div>
                </div>
            </div>

            <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-lg">
                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zM12 2a10 10 0 100 20 10 10 0 000-20z"/>
                </svg>
                <div>
                    <div class="text-xs text-gray-400">Username</div>
                    <div class="text-sm font-medium text-gray-800 font-mono" th:text="${student.username}">username</div>
                </div>
            </div>

            <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-lg">
                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                </svg>
                <div>
                    <div class="text-xs text-gray-400">Email</div>
                    <div class="text-sm font-medium text-gray-800" th:text="${student.email ?: 'Not set'}">email</div>
                </div>
            </div>

            <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-lg">
                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
                </svg>
                <div>
                    <div class="text-xs text-gray-400">Phone</div>
                    <div class="text-sm font-medium text-gray-800" th:text="${student.phone ?: 'Not set'}">phone</div>
                </div>
            </div>

            <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-lg">
                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <div>
                    <div class="text-xs text-gray-400">Account Status</div>
                    <div th:if="${student.enabled}" class="text-sm font-medium text-green-700">Active</div>
                    <div th:unless="${student.enabled}" class="text-sm font-medium text-red-700">Disabled</div>
                </div>
            </div>

            <div class="pt-2 border-t border-gray-100">
                <p class="text-xs text-gray-400 text-center">
                    To update your profile details, contact your administrator.
                </p>
            </div>
        </div>
    </div>
</div>

</th:block>
</html>
