<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${exam.title + ' — CET Portal'}">Exam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>[x-cloak]{display:none!important}</style>
</head>
<body class="bg-gray-100 font-sans antialiased"
      x-data="examApp()"
      x-init="startTimer()">

<!-- Top Bar -->
<header class="fixed top-0 left-0 right-0 z-30 bg-white border-b border-gray-200 h-14 flex items-center justify-between px-4 shadow-sm">
    <div class="font-semibold text-gray-800 text-sm truncate max-w-xs" th:text="${exam.title}">Exam</div>
    <div class="flex items-center gap-4">
        <!-- Timer -->
        <div class="flex items-center gap-2 font-mono text-base font-bold"
             :class="timeLeft <= 300 ? 'text-red-600' : 'text-gray-800'">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <span x-text="formatTime(timeLeft)">00:00:00</span>
        </div>
        <!-- Submit Button -->
        <form th:action="@{/student/exam/{id}/submit(id=${attempt.id})}" method="post"
              onsubmit="return confirm('Submit exam? You cannot change answers after submission.')">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit"
                    class="px-4 py-1.5 bg-green-600 hover:bg-green-700 text-white text-sm font-semibold rounded-lg transition-colors">
                Submit
            </button>
        </form>
    </div>
</header>

<div class="pt-14 flex h-screen overflow-hidden">

    <!-- Question Panel -->
    <main class="flex-1 overflow-y-auto p-4">
        <div class="max-w-3xl mx-auto">

            <!-- Question Navigation Header -->
            <div class="bg-white rounded-xl border border-gray-100 p-4 mb-4 flex items-center justify-between">
                <div class="text-sm font-medium text-gray-600">
                    Question <span class="text-blue-600 font-bold" th:text="${currentQ}">1</span>
                    of <span th:text="${totalQ}">100</span>
                </div>
                <div class="flex gap-2 text-xs">
                    <span class="flex items-center gap-1 text-green-600">
                        <span class="w-3 h-3 bg-green-500 rounded-sm inline-block"></span>Answered
                    </span>
                    <span class="flex items-center gap-1 text-purple-600">
                        <span class="w-3 h-3 bg-purple-500 rounded-sm inline-block"></span>Marked
                    </span>
                    <span class="flex items-center gap-1 text-gray-400">
                        <span class="w-3 h-3 bg-gray-200 rounded-sm inline-block"></span>Not Visited
                    </span>
                </div>
            </div>

            <!-- Question Image -->
            <div class="bg-white rounded-xl border border-gray-100 p-5 mb-4">
                <div th:if="${questionImagePath != null}">
                    <img th:src="${questionImagePath}" alt="Question"
                         class="w-full rounded-lg border border-gray-100 max-h-[60vh] object-contain"/>
                </div>
                <div th:unless="${questionImagePath != null}"
                     class="text-center py-16 text-gray-400">
                    <svg class="w-16 h-16 mx-auto mb-3 text-gray-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                    </svg>
                    <p class="text-sm">Question <span th:text="${currentQ}">1</span> image not uploaded yet.</p>
                </div>
            </div>

            <!-- Options -->
            <div class="bg-white rounded-xl border border-gray-100 p-5 mb-4">
                <p class="text-sm font-medium text-gray-600 mb-3">Select your answer:</p>
                <div class="grid grid-cols-2 gap-3">
                    <th:block th:each="opt : ${ {'A','B','C','D'} }">
                        <button type="button"
                                th:attr="data-option=${opt}"
                                th:classappend="${currentAnswer == opt} ? 'ring-2 ring-blue-600 bg-blue-50 text-blue-700' : 'bg-gray-50 text-gray-700 hover:bg-blue-50 hover:text-blue-600'"
                                class="flex items-center gap-3 p-3 rounded-xl border border-gray-200 transition-all font-medium text-sm"
                                @click="selectOption($event.target.closest('button').dataset.option)">
                            <span class="w-7 h-7 rounded-full border-2 flex items-center justify-center text-xs font-bold flex-shrink-0"
                                  th:text="${opt}">A</span>
                            <span>Option <span th:text="${opt}">A</span></span>
                        </button>
                    </th:block>
                </div>

                <!-- Action Buttons -->
                <div class="flex flex-wrap gap-2 mt-4 pt-4 border-t border-gray-100">
                    <button type="button" @click="clearAnswer()"
                            class="px-4 py-2 bg-red-50 hover:bg-red-100 text-red-600 text-sm font-medium rounded-lg transition-colors">
                        Clear
                    </button>
                    <button type="button"
                            th:classappend="${currentMarked} ? 'bg-purple-100 text-purple-700' : 'bg-gray-100 text-gray-600'"
                            @click="toggleMark()"
                            class="px-4 py-2 hover:bg-purple-100 hover:text-purple-700 text-sm font-medium rounded-lg transition-colors">
                        <span th:text="${currentMarked} ? '★ Marked for Review' : '☆ Mark for Review'">Mark</span>
                    </button>
                </div>
            </div>

            <!-- Navigation Buttons -->
            <div class="flex justify-between gap-3">
                <a th:if="${currentQ > 1}"
                   th:href="@{/student/exam/{id}/take(id=${attempt.id}, q=${currentQ - 1})}"
                   class="px-5 py-2.5 bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 text-sm font-medium rounded-lg transition-colors">
                    ← Previous
                </a>
                <span th:unless="${currentQ > 1}"></span>

                <a th:if="${currentQ < totalQ}"
                   th:href="@{/student/exam/{id}/take(id=${attempt.id}, q=${currentQ + 1})}"
                   class="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold rounded-lg transition-colors">
                    Save &amp; Next →
                </a>
            </div>
        </div>
    </main>

    <!-- Question Palette (sidebar) -->
    <aside class="w-56 bg-white border-l border-gray-200 overflow-y-auto p-4 hidden md:block">
        <h3 class="text-xs font-semibold text-gray-500 uppercase mb-3">Question Palette</h3>
        <div class="grid grid-cols-5 gap-1">
            <th:block th:with="answeredNums=${answers.stream().filter(a -> a.selectedOption != null).map(a -> a.questionNumber).toList()},
                               markedNums=${answers.stream().filter(a -> a.markedForReview).map(a -> a.questionNumber).toList()}">
                <a th:each="i : ${#numbers.sequence(1, totalQ)}"
                   th:href="@{/student/exam/{id}/take(id=${attempt.id}, q=${i})}"
                   th:text="${i}"
                   th:classappend="${i == currentQ} ? 'ring-2 ring-blue-600 bg-blue-600 text-white' :
                                  (${markedNums.contains(i)} ? 'bg-purple-100 text-purple-700' :
                                  (${answeredNums.contains(i)} ? 'bg-green-100 text-green-700' :
                                  'bg-gray-100 text-gray-500 hover:bg-blue-50'))"
                   class="aspect-square flex items-center justify-center text-xs font-medium rounded transition-colors">
                </a>
            </th:block>
        </div>
    </aside>
</div>

<script th:inline="javascript">
    const ATTEMPT_ID = /*[[${attempt.id}]]*/ 0;
    const CURRENT_Q = /*[[${currentQ}]]*/ 1;
    const CSRF_TOKEN = /*[[${_csrf.token}]]*/ '';
    const CSRF_HEADER = /*[[${_csrf.parameterName}]]*/ '_csrf';
    let selectedOption = /*[[${currentAnswer}]]*/ null;
    let isMarked = /*[[${currentMarked}]]*/ false;

    function examApp() {
        return {
            timeLeft: /*[[${remainingSeconds}]]*/ 0,
            timer: null,

            startTimer() {
                this.timer = setInterval(() => {
                    if (this.timeLeft > 0) {
                        this.timeLeft--;
                    } else {
                        clearInterval(this.timer);
                        document.querySelector('form[action*="submit"]').submit();
                    }
                }, 1000);
            },

            formatTime(seconds) {
                const h = Math.floor(seconds / 3600);
                const m = Math.floor((seconds % 3600) / 60);
                const s = seconds % 60;
                return [h, m, s].map(v => String(v).padStart(2, '0')).join(':');
            },

            async selectOption(opt) {
                selectedOption = opt;
                // Update UI
                document.querySelectorAll('[data-option]').forEach(btn => {
                    btn.classList.remove('ring-2', 'ring-blue-600', 'bg-blue-50', 'text-blue-700');
                    btn.classList.add('bg-gray-50', 'text-gray-700');
                });
                const btn = document.querySelector(`[data-option="${opt}"]`);
                if (btn) {
                    btn.classList.remove('bg-gray-50', 'text-gray-700');
                    btn.classList.add('ring-2', 'ring-blue-600', 'bg-blue-50', 'text-blue-700');
                }
                await this.saveAnswer();
            },

            async clearAnswer() {
                selectedOption = null;
                document.querySelectorAll('[data-option]').forEach(btn => {
                    btn.classList.remove('ring-2', 'ring-blue-600', 'bg-blue-50', 'text-blue-700');
                    btn.classList.add('bg-gray-50', 'text-gray-700');
                });
                await this.saveAnswer();
            },

            async toggleMark() {
                isMarked = !isMarked;
                await this.saveAnswer();
            },

            async saveAnswer() {
                try {
                    await fetch(`/student/exam/${ATTEMPT_ID}/answer`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRF-TOKEN': CSRF_TOKEN
                        },
                        body: JSON.stringify({
                            questionNumber: CURRENT_Q,
                            selectedOption: selectedOption,
                            markedForReview: isMarked
                        })
                    });
                } catch (e) { console.error('Save failed', e); }
            }
        };
    }
</script>
</body>
</html>
