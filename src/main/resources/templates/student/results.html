<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/main :: layout(~{::content}, 'My Results')}">
<th:block th:fragment="content">

<div class="space-y-4">
    <div th:if="${#lists.isEmpty(attempts)}"
         class="bg-white rounded-xl shadow-sm border border-gray-100 p-12 text-center text-gray-400">
        <svg class="w-12 h-12 mx-auto mb-3 text-gray-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
        <p class="text-sm">No completed exams yet.</p>
        <a href="/student/exams" class="mt-3 inline-block text-blue-600 hover:underline text-sm">Browse exams →</a>
    </div>

    <div th:each="a : ${attempts}"
         class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 hover:border-blue-200 transition-colors">
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
            <div class="flex items-center gap-4">
                <!-- Score circle -->
                <div class="w-14 h-14 rounded-full flex items-center justify-center text-sm font-bold flex-shrink-0"
                     th:classappend="${a.result != null && a.result.percentage >= 60} ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'"
                     th:text="${a.result != null ? #numbers.formatDecimal(a.result.percentage, 1, 0) + '%' : '—'}">0%</div>
                <div>
                    <h3 class="font-semibold text-gray-800" th:text="${a.exam.title}">Exam</h3>
                    <p class="text-xs text-gray-500 mt-0.5">
                        Score: <strong th:text="${a.result?.rawScore ?: 0}">0</strong> ·
                        Correct: <span class="text-green-600" th:text="${a.result?.correct ?: 0}">0</span> ·
                        Wrong: <span class="text-red-600" th:text="${a.result?.wrong ?: 0}">0</span>
                    </p>
                </div>
            </div>
            <a th:href="@{/student/result/{id}(id=${a.id})}"
               class="px-4 py-2 bg-blue-50 hover:bg-blue-100 text-blue-700 text-sm font-medium rounded-lg transition-colors flex-shrink-0">
                View Result
            </a>
        </div>
    </div>
</div>

</th:block>
</html>
