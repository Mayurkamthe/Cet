# Application
spring.application.name=CET Mock Test Portal
server.port=8080

# SQLite Database
spring.datasource.url=jdbc:sqlite:./data/cetportal.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Upload directory (relative to working dir)
app.upload.dir=./src/main/resources/static/uploads
app.pages.dir=./src/main/resources/static/uploads/pages

# Logging
logging.level.com.aparaitech=DEBUG
logging.level.org.springframework.security=WARN
