# ─────────────────────────────────────────────
#  CET Mock Test Portal — Application Config
# ─────────────────────────────────────────────

# Application
spring.application.name=CET Mock Test Portal
server.port=8080

# ─── SQLite Database ──────────────────────────
spring.datasource.url=jdbc:sqlite:./data/cetportal.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# ─── JPA / Hibernate ─────────────────────────
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
# update  → auto-create/alter tables on startup (recommended for dev)
# validate → only validate schema (recommended for production)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ─── Thymeleaf ───────────────────────────────
# Set cache=true in production for better performance
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ─── File Upload ─────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ─── Upload Directories ───────────────────────
# Change these to absolute paths in production, e.g. /var/cetportal/uploads
app.upload.dir=./src/main/resources/static/uploads
app.pages.dir=./src/main/resources/static/uploads/pages

# ─── Admin Seed Credentials ──────────────────
# Used by DataInitializer on first run only (if admin user does not exist).
# IMPORTANT: Change these before deploying to production!
app.admin.username=admin
app.admin.password=admin123
app.admin.fullName=Administrator
app.admin.email=admin@cetportal.com

# ─── Institute Branding ──────────────────────
# These values appear on the login page, sidebar, header, and footer.
# logoUrl: place your logo in src/main/resources/static/images/ then set e.g. /images/logo.png
# logoText: 2-3 letter fallback shown when logoUrl is empty
app.institute.name=CET Mock Test Portal
app.institute.tagline=Excellence in CET / NEET / JEE Preparation
app.institute.logoUrl=
app.institute.logoText=CP
app.institute.address=Baramati, Pune, Maharashtra
app.institute.phone=+91 98765 43210
app.institute.email=info@cetportal.com
app.institute.copyright=Aparaitech Software

# ─── Logging ─────────────────────────────────
logging.level.com.aparaitech=DEBUG
logging.level.org.springframework.security=WARN
# Set to INFO or WARN in production
logging.level.root=INFO
