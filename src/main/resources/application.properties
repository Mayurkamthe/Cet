# ─────────────────────────────────────────────
#  CET Mock Test Portal — Application Config
# ─────────────────────────────────────────────

# Application
spring.application.name=CET Mock Test Portal
server.port=${PORT:8080}

# ─── SQLite Database ──────────────────────────
spring.datasource.url=jdbc:sqlite:${DB_PATH:./data/cetportal.db}
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# ─── JPA / Hibernate ─────────────────────────
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
# update  → auto-create/alter tables on startup (recommended for dev)
# validate → only validate schema (recommended for production)
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ─── Thymeleaf ───────────────────────────────
# Set cache=true in production for better performance
spring.thymeleaf.cache=${THYMELEAF_CACHE:false}
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ─── File Upload ─────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ─── Upload Directories ───────────────────────
# Change these to absolute paths in production, e.g. /var/cetportal/uploads
app.upload.dir=${UPLOAD_DIR:./src/main/resources/static/uploads}
app.pages.dir=${PAGES_DIR:./src/main/resources/static/uploads/pages}

# ─── Admin Seed Credentials ──────────────────
# Used by DataInitializer on first run only (if admin user does not exist).
# IMPORTANT: Change these before deploying to production!
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD:admin123}
app.admin.fullName=${ADMIN_FULL_NAME:Administrator}
app.admin.email=${ADMIN_EMAIL:admin@cetportal.com}

# ─── Institute Branding ──────────────────────
# These values appear on the login page, sidebar, header, and footer.
# logoUrl: place your logo in src/main/resources/static/images/ then set e.g. /images/logo.png
# logoText: 2-3 letter fallback shown when logoUrl is empty
app.institute.name=${INSTITUTE_NAME:CET Mock Test Portal}
app.institute.tagline=${INSTITUTE_TAGLINE:Excellence in CET / NEET / JEE Preparation}
app.institute.logoUrl=${INSTITUTE_LOGO_URL:}
app.institute.logoText=${INSTITUTE_LOGO_TEXT:CP}
app.institute.address=${INSTITUTE_ADDRESS:Baramati, Pune, Maharashtra}
app.institute.phone=${INSTITUTE_PHONE:+91 98765 43210}
app.institute.email=${INSTITUTE_EMAIL:info@cetportal.com}
app.institute.copyright=${INSTITUTE_COPYRIGHT:Aparaitech Software}

# ─── Error Handling ───────────────────────────
# Disable Spring Boot's default Whitelabel Error Page - always use our
# custom AuthController#handleError -> error/general.html instead
server.error.whitelabel.enabled=false
server.error.path=/error

# ─── Logging ─────────────────────────────────
logging.level.com.aparaitech=${LOG_LEVEL_APP:DEBUG}
logging.level.org.springframework.security=WARN
# Set to INFO or WARN in production
logging.level.root=${LOG_LEVEL_ROOT:INFO}
